<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amiibo Lab Exam Solution</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: flex;
            padding: 0;
            margin: 0;
            background-color: gainsboro;
            flex-direction: column;
            gap: 10px;
            font-family: sans-serif;
        }

        nav {
            padding: 10px;
            color: white;
            font-size: 25px;
            font-weight: bold;
            font-family: monospace;
            background-color: blue;
            display: flex;
            box-shadow: 0px 10px 5px 0px rgba(0,0,0,0.31);
        }

        main {
            margin-right: auto;
            margin-left: auto;
            width: 95vw;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        section {
            display: flex;
            align-items: center;
            justify-content: space-evenly;      
            padding: 15px;
        }

        .card {
            border-radius: 2px;
            background-color: white;
            font-size: 0.7em;
            padding: 8px;
            box-shadow: -11px 9px 5px -4px rgba(0,0,0,0.31);
            border: 1px solid gainsboro;
        }

        article {
            display: flex;
            flex-direction: row;
            gap: 20px;
        }

        .scrollable {
            display: flex;
            flex-grow: 4;
            max-height: 70vh;
            overflow-y: scroll;
        }

        aside {
            display: flex;
            flex-grow: 2;
            background-color: white;
            flex-direction: column;
            padding: 15px;
            border-radius: 2px;
            box-shadow: -11px 9px 5px -4px rgba(0,0,0,0.31);
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        thead th {
            position: sticky;
            top: 0;
            background-color: blue;
            color: white;
            font-weight: bold;
            font-size: 1.5em;
            padding: 10px;
            z-index: 1;
        }

        thead button {
            height: 25px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        td {
            font-size: 1.5em;
            text-align: center;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:nth-child(even) { background-color: #f2f2f2; }
        tr:hover { background-color: #ddd; }

        table img {
            height: 80px;
        }

        button {
            cursor: pointer;
            padding: 5px 10px;
        }
    </style>
</head>
<body>

    <nav>Amiibo App</nav>

    <main>
        <section class="card">
            <button onclick="filterBySeries('Animal Crossing')">Animal Crossing</button>
            <button onclick="filterBySeries('Breath of the Wild')">Breath of the Wild</button>
            <button onclick="filterBySeries('Super Mario')">Super Mario</button>
            <input type="search" id="searchKey" placeholder="search name">
            <button onclick="search()">Search</button>
            <button onclick="showAllGames()">Reset</button>
        </section>

        <article>
            <div class="scrollable card">
                <table>
                    <thead>
                        <tr>
                            <th>Name <button onclick="sortByName()">Sort</button></th>
                            <th>Series</th>
                            <th>Image</th>
                            <th>Release</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="result"></tbody>
                </table>
            </div>

            <aside class="card">
                <h2>Details</h2>
                <h4>Supported Games For: <span id="character">---</span></h4>
                <ul id="games">
                    <li>Select an Amiibo to see supported games.</li>
                </ul>
            </aside>
        </article>
    </main>

    <script>
        let state = [];

        async function getData() {
            const response = await fetch('https://amiiboapi.com/api/amiibo/?showusage');
            const data = await response.json();
            return data.amiibo.slice(0, 100);
        }

        async function showAllGames() {
            state = await getData();
            drawTable(state);
        }

        function drawTable(records) {
            let result = document.querySelector('#result');
            let html = '';
            for (let rec of records) {
                html += `
                <tr>
                    <td>${rec.character}</td>
                    <td>${rec.gameSeries}</td>
                    <td><img src="${rec.image}"></td>
                    <td>${rec.release.na || 'N/A'}</td>
                    <td>
                        <button onclick="viewDetails('${rec.head}', '${rec.tail}')">View Details</button>
                    </td>
                </tr>`;
            }
            result.innerHTML = html;
        }

        function filterBySeries(series) {
            let filtered = state.filter(rec => rec.gameSeries === series);
            drawTable(filtered);
        }

        function search() {
            let searchKey = document.querySelector('#searchKey').value.toUpperCase();
            let results = state.filter(rec => 
                rec.character.toUpperCase().includes(searchKey)
            );
            drawTable(results);
        }

        function sortByName() {
            let sorted = [...state].sort((a, b) => a.character.localeCompare(b.character));
            drawTable(sorted);
        }

        function viewDetails(head, tail) {
            let record = state.find(rec => rec.head === head && rec.tail === tail);
            document.querySelector('#character').innerHTML = record.character;
            let gamesList = document.querySelector('#games');
            let html = '';
            if (record.gamesSwitch && record.gamesSwitch.length > 0) {
                for (let game of record.gamesSwitch) {
                    html += `<li>${game.gameName}</li>`;
                }
            } else {
                html = '<li>No specific Switch games listed.</li>';
            }
            gamesList.innerHTML = html;
        }

        showAllGames();
    </script>
</body>
</html>
